services:
  auto-reviewer:
    build: .
    image: auto-reviewer:latest
    container_name: auto-reviewer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Bind the web UI inside the container to 0.0.0.0 so the host port mapping
      # below can reach it. The host side still only listens on 127.0.0.1, so
      # the UI is not exposed to your LAN.
      AUTO_REVIEWER_WEB_HOST: "0.0.0.0"
      AUTO_REVIEWER_WEB_PORT: "8787"
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      # Optional one-time bootstrap. If present at first boot, values are
      # copied into the sqlite DB and the file is ignored from then on. The UI
      # is the source of truth after that.
      - ./config.yaml:/app/config.yaml:ro

      # The Claude Max session lives in ~/.claude on the host. Mount it so the
      # containerized `claude -p` runs against your logged-in Max subscription
      # instead of trying to start an OAuth flow it can't complete.
      #
      # IMPORTANT: the container runs as the `bun` user (UID/GID 1000) that
      # ships with oven/bun:1-debian. If your host ~/.claude is owned by a
      # different UID, chown it to 1000 on the host.
      - ${HOME}/.claude:/home/bun/.claude

      # Persistent state: reviews + events + config lives here.
      - ./data:/app/data

  # Optional Cloudflare Tunnel sidecar. Uncomment + set CLOUDFLARE_TUNNEL_TOKEN
  # in .env to expose /webhook/github to the internet without opening firewall
  # ports. Route the tunnel's public hostname at the auto-reviewer:8787 service
  # in the Cloudflare dashboard. Point your GitHub webhook at
  # https://<your-tunnel-hostname>/webhook/github with the same secret as
  # GITHUB_WEBHOOK_SECRET.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: auto-reviewer-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - auto-reviewer
