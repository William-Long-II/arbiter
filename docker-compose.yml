services:
  reviewme:
    build: .
    image: reviewme:latest
    container_name: reviewme
    restart: unless-stopped
    # The reverse proxy should terminate HTTPS and forward to this port.
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    # Mount repos.yaml so operators can update the allowlist without
    # rebuilding the image. Restart the container after editing.
    volumes:
      - ./repos.yaml:/app/repos.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
