name: arbiter

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arbiter
      POSTGRES_PASSWORD: arbiter
      POSTGRES_DB: arbiter
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbiter"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8787
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8787}
      DATABASE_URL: postgres://arbiter:arbiter@db:5432/arbiter
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      CLAUDE_DEFAULT_MODE: ${CLAUDE_DEFAULT_MODE:-subscription}
      CLAUDE_BIN: ${CLAUDE_BIN:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-5}
    volumes:
      # Mount host ~/.claude/ so the container can use the user's
      # Claude Code subscription credentials when running `claude -p`.
      # CLAUDE_HOST_DIR pins an explicit host path: required on
      # Windows, where ${HOME} is unset under PowerShell so the old
      # default fell back to a nonexistent /root/.claude and mounted
      # empty. Set it in .env. Linux/macOS still auto-resolve
      # ~/.claude. Comment the line out entirely for api-only mode.
      - ${CLAUDE_HOST_DIR:-${HOME:-/root}/.claude}:/root/.claude
    ports:
      - "8787:8787"

volumes:
  db-data:
